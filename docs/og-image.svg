<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Crystal lattice pattern -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none">
    <circle cx="200" cy="150" r="40"/>
    <circle cx="400" cy="150" r="40"/>
    <circle cx="300" cy="280" r="40"/>
    <circle cx="200" cy="410" r="40"/>
    <circle cx="400" cy="410" r="40"/>
    <line x1="200" y1="150" x2="400" y2="150"/>
    <line x1="200" y1="150" x2="300" y2="280"/>
    <line x1="400" y1="150" x2="300" y2="280"/>
    <line x1="200" y1="410" x2="300" y2="280"/>
    <line x1="400" y1="410" x2="300" y2="280"/>
    <line x1="200" y1="150" x2="200" y2="410"/>
    <line x1="400" y1="150" x2="400" y2="410"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">CondensAI</text>
  
  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle">Domain Expert LLM for Condensed Matter Physics</text>
  
  <!-- Features -->
  <g font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.85)" text-anchor="middle">
    <text x="600" y="440">RAG Pipeline • LoRA Fine-tuning • CMPhysBench Eval</text>
  </g>
  
  <!-- GitHub badge -->
  <rect x="350" y="500" width="500" height="60" rx="8" fill="white" fill-opacity="0.2"/>
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">github.com/Houchen181/cm-expert-llm</text>
</svg>
